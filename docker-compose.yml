services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cve-db-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cve_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cve-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cve-app-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/cve_db
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      NVD_API_KEY: ${NVD_API_KEY:-}
      DEBUG: "False"
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - cve-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cve-app-frontend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cve-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  cve-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
